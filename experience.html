<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel's Portfolio — Experience</title>

    <!-- SEO (overridden dynamically by JS below for each experience) -->
    <meta name="description" content="Professional experience of Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta name="author" content="Gabriel Fernandes Neves">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gabtrex.github.io/experience.html">
    <meta property="og:title" content="Gabriel's Portfolio — Experience">
    <meta property="og:description" content="Professional experience of Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta property="og:image" content="https://gabtrex.github.io/images/FavIcon/Gabtrex.png">
    <meta property="og:site_name" content="Gabtrex Portfolio">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://gabtrex.github.io/experience.html">
    <meta name="twitter:title" content="Gabriel's Portfolio — Experience">
    <meta name="twitter:description" content="Professional experience of Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta name="twitter:image" content="https://gabtrex.github.io/images/FavIcon/Gabtrex.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/FavIcon/Gabtrex.png"/>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header></header>

<!-- Hero -->
<div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-text">
            <h2 id="experience-title">Experience Title</h2>
            <p id="experience-date-hero" class="project-date-hero"></p>
            <p id="experience-subtitle">Short description of the experience</p>
        </div>
        <div class="hero-actions">
            <a id="website-link" href="#" class="button" target="_blank" rel="noopener noreferrer">Visit Website</a>
        </div>
    </div>
</div>

<!-- Showcase -->
<section class="project-showcase">

    <div class="project-about">
        <h1>About</h1>
        <div id="experience-description"></div>
    </div>

    <div id="experience-skills-section" style="margin-top: 3rem;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff;">Skills Used</h2>
        <div class="skills-grid" id="experience-skills-grid"></div>
    </div>

</section>

<script src="skills.js"></script>
<script src="data.js"></script>
<script src="header.js"></script>
<script src="cursor.js"></script>
<script>
    const key = new URLSearchParams(window.location.search).get('experience');
    const e   = experiences[key];

    if (e) {
        document.title = e.title + " | Gabriel's Portfolio";

        // Update meta tags dynamically
        const pageUrl = 'https://gabtrex.github.io/experience.html?experience=' + key;
        const heroImg = 'https://gabtrex.github.io/' + e.heroImg;
        const desc    = e.cardSubtitle || e.subtitle || '';
        document.querySelector('meta[name="description"]').setAttribute('content', desc);
        document.querySelector('meta[property="og:title"]').setAttribute('content', e.title + ' — ' + e.subtitle + ' | Gabtrex');
        document.querySelector('meta[property="og:description"]').setAttribute('content', desc);
        document.querySelector('meta[property="og:url"]').setAttribute('content', pageUrl);
        document.querySelector('meta[property="og:image"]').setAttribute('content', heroImg);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', e.title + ' — ' + e.subtitle + ' | Gabtrex');
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', desc);
        document.querySelector('meta[name="twitter:image"]').setAttribute('content', heroImg);

        document.getElementById('experience-title').innerText    = e.title;
        document.getElementById('experience-subtitle').innerText = e.subtitle;
        document.getElementById('experience-description').innerHTML = e.description;

        const dateEl = document.getElementById('experience-date-hero');
        dateEl.innerText     = e.date || '';
        dateEl.style.display = e.date ? 'block' : 'none';

        const heroBg = document.getElementById('heroBg');
        heroBg.style.backgroundImage    = `url('${e.heroImg}')`;
        heroBg.style.backgroundPosition = e.heroPosition || 'center 20%';
        heroBg.style.backgroundSize     = e.heroSize || 'cover';
        setTimeout(() => heroBg.classList.add('loaded'), 50);

        const websiteLink  = document.getElementById('website-link');
        websiteLink.href   = e.websiteLink || '#';
        websiteLink.innerText = e.isGame ? 'Play Game' : 'Visit Website';

        const grid = document.getElementById('experience-skills-grid');
        if (e.skills && e.skills.length > 0) {
            e.skills.forEach(k => {
                const skill = allSkills[k];
                if (!skill) return;
                grid.innerHTML += `
                    <div class="skill-item">
                        <div class="skill-icon"><img src="${skill.img}" alt="${skill.label}"></div>
                        <span>${skill.label}</span>
                    </div>
                `;
            });
        } else {
            document.getElementById('experience-skills-section').style.display = 'none';
        }
    }
</script>

</body>
</html>
