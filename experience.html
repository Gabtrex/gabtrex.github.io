<!DOCTYPE html>
<html lang="en">
<head>

    <title>Gabriel's Portfolio</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Glassy Top Bar -->
<header>
    <a href="index.html" class="name-button">
        <div class="name-container">
            <h1 class="main-name">Gabriel Fernandes Neves</h1>
            <h2 class="sub-name">Gabtrex</h2>
        </div>
    </a>
    <nav>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'about')">About</a>

        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'connect')">Connect</a>
    </nav>
</header>

<!-- Hero Image -->
<div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-text">
            <h2 id="experience-title">Experience Title</h2>
            <p id="experience-subtitle">Short description of the experience</p>
        </div>
        <div class="hero-actions">
            <a id="website-link" href="#" class="button" target="_blank">Visit Website</a>
        </div>
    </div>
</div>

<!-- Experience Showcase -->
<section class="project-showcase">

    <!-- About / Description -->
    <div class="project-about">
        <h1>About</h1>
        <p id="experience-description">Detailed experience description goes here.</p>
    </div>

    <!-- Skills Used -->
    <div id="experience-skills-section" style="margin-top: 3rem;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff;">Skills Used</h2>
        <div class="skills-grid" id="experience-skills-grid"></div>
    </div>

</section>

<script src="skills.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const experience = urlParams.get('experience');

const experiences = {
    playmanity: {
        title: "Community Manager",
        subtitle: "Playmanity · 2022 – Present",
        description: `
            <p>Community Manager at Playmanity, serving as the primary point of contact and public-facing presence for the community. Responsible for organizing events and giveaways, actively engaging with users, and maintaining a dynamic and interactive environment to foster long-term community retention and growth.</p>
        `,
        heroImg: "images/Playmanity/Hero/Pm.png",
        heroPosition: "center 0%",
        websiteLink: "https://playmanity.net",
        skills: ["community", "eventorg", "photoshop", "premiere"]
    }
};

if (experience && experiences[experience]) {
    const e = experiences[experience];

    document.title = e.title + " | Gabriel's Portfolio";

    document.getElementById('experience-title').innerText = e.title;
    document.getElementById('experience-subtitle').innerText = e.subtitle;
    document.getElementById('experience-description').innerHTML = e.description;

    const heroBg = document.getElementById('heroBg');
    heroBg.style.backgroundImage = `url('${e.heroImg}')`;
    heroBg.style.backgroundPosition = e.heroPosition || 'center 20%';
    setTimeout(() => heroBg.classList.add('loaded'), 50);

    const websiteLink = document.getElementById('website-link');
    websiteLink.href = e.websiteLink || '#';

    // Render skills
    const grid = document.getElementById('experience-skills-grid');
    if (e.skills && e.skills.length > 0) {
        e.skills.forEach(key => {
            const skill = allSkills[key];
            if (!skill) return;
            grid.innerHTML += `
                <div class="skill-item">
                    <div class="skill-icon">
                        <img src="${skill.img}" alt="${skill.label}">
                    </div>
                    <span>${skill.label}</span>
                </div>
            `;
        });
    } else {
        document.getElementById('experience-skills-section').style.display = 'none';
    }
}
</script>

</body>
</html>
