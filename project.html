<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel's Portfolio</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <a href="index.html" class="name-button">
        <div class="name-container">
            <h1 class="main-name">Gabriel Fernandes Neves</h1>
            <h2 class="sub-name">Gabtrex</h2>
        </div>
    </a>
    <nav>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'about')">About</a>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'skills')">Skills</a>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'projects')">Projects</a>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'experience')">Experience</a>
        <a href="index.html" onclick="sessionStorage.setItem('scrollTo', 'connect')">Connect</a>
    </nav>
</header>

<!-- Hero -->
<div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-text">
            <h2 id="project-title">Project Title</h2>
            <p id="project-date-hero" class="project-date-hero"></p>
            <p id="project-subtitle">Short tagline or description of the project</p>
        </div>
        <div class="hero-actions">
            <a id="play-link" href="#" class="button">Play Game</a>
        </div>
    </div>
</div>

<!-- Showcase -->
<section class="project-showcase">

    <div class="screenshots">
        <img id="screenshot1" src="" alt="Screenshot 1">
        <img id="screenshot2" src="" alt="Screenshot 2">
        <img id="screenshot3" src="" alt="Screenshot 3">
    </div>

    <div class="project-about">
        <h1>About</h1>
        <p id="project-description"></p>
    </div>

    <div id="project-skills-section" style="margin-top: 3rem;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff;">Skills Used</h2>
        <div class="skills-grid" id="project-skills-grid"></div>
    </div>

</section>

<script src="skills.js"></script>
<script src="data.js"></script>
<script>
    const key = new URLSearchParams(window.location.search).get('project');
    const p   = projects[key];

    if (p) {
        document.title = p.title + " | Gabriel's Portfolio";

        document.getElementById('project-title').innerText    = p.title;
        document.getElementById('project-subtitle').innerText = p.subtitle;
        document.getElementById('project-description').innerHTML = p.description;

        const dateEl = document.getElementById('project-date-hero');
        dateEl.innerText     = p.date || '';
        dateEl.style.display = p.date ? 'block' : 'none';

        const heroBg = document.getElementById('heroBg');
        heroBg.style.backgroundImage    = `url('${p.heroImg}')`;
        heroBg.style.backgroundPosition = p.heroPosition || 'center 20%';
        setTimeout(() => heroBg.classList.add('loaded'), 50);

        const playLink   = document.getElementById('play-link');
        playLink.href    = p.playLink;
        playLink.target  = '_blank';
        playLink.innerText = p.isGame === false ? 'Visit Website' : 'Play Game';

        document.getElementById('screenshot1').src = p.screenshots[0];
        document.getElementById('screenshot2').src = p.screenshots[1];
        document.getElementById('screenshot3').src = p.screenshots[2];

        const grid = document.getElementById('project-skills-grid');
        if (p.skills && p.skills.length > 0) {
            p.skills.forEach(k => {
                const skill = allSkills[k];
                if (!skill) return;
                grid.innerHTML += `
                    <div class="skill-item">
                        <div class="skill-icon"><img src="${skill.img}" alt="${skill.label}"></div>
                        <span>${skill.label}</span>
                    </div>
                `;
            });
        } else {
            document.getElementById('project-skills-section').style.display = 'none';
        }
    }
</script>

</body>
</html>
