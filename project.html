<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel's Portfolio — Project</title>

    <!-- SEO (overridden dynamically by JS below for each project) -->
    <meta name="description" content="A project by Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta name="author" content="Gabriel Fernandes Neves">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gabtrex.github.io/project.html">
    <meta property="og:title" content="Gabriel's Portfolio — Project">
    <meta property="og:description" content="A project by Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta property="og:image" content="https://gabtrex.github.io/images/FavIcon/Gabtrex.png">
    <meta property="og:site_name" content="Gabtrex Portfolio">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gabriel's Portfolio — Project">
    <meta name="twitter:description" content="A project by Gabriel Fernandes Neves (Gabtrex), solo game developer.">
    <meta name="twitter:image" content="https://gabtrex.github.io/images/FavIcon/Gabtrex.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/FavIcon/Gabtrex.png"/>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header></header>

<!-- Hero -->
<div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-text">
            <h2 id="project-title">Project Title</h2>
            <p id="project-date-hero" class="project-date-hero"></p>
            <p id="project-subtitle">Short tagline or description of the project</p>
        </div>
        <div class="hero-actions">
            <a id="play-link" href="#" class="button" rel="noopener noreferrer">Play Game</a>
            <a id="play-browser-btn" href="#play-in-browser" class="button" style="display:none;">Play in Browser</a>
        </div>
    </div>
</div>

<!-- Showcase -->
<section class="project-showcase">

    <div class="screenshots">
        <img id="screenshot1" src="" alt="Screenshot 1">
        <img id="screenshot2" src="" alt="Screenshot 2">
        <img id="screenshot3" src="" alt="Screenshot 3">
    </div>

    <div class="project-about">
        <h1>About</h1>
        <div id="project-description"></div>
    </div>

    <div id="project-skills-section" style="margin-top: 3rem;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff;">Skills Used</h2>
        <div class="skills-grid" id="project-skills-grid"></div>
    </div>

    <!-- Play in Browser embed (only shown if embedUrl is set in data.js) -->
    <div id="play-in-browser" style="display:none; margin-top: 4rem;">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff;">Play in Browser</h2>
        <div class="game-embed-wrapper">
            <iframe id="game-iframe" src="" allowfullscreen frameborder="0" scrolling="no" allow="autoplay; fullscreen *; gamepad; gyroscope; accelerometer; cross-origin-isolated"></iframe>
            <button class="game-fullscreen-btn" id="game-fullscreen-btn" title="Fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>
    </div>

</section>

<script src="skills.js"></script>
<script src="data.js"></script>
<script src="header.js"></script>
<script src="cursor.js"></script>
<script>
    const key = new URLSearchParams(window.location.search).get('project');
    const p   = projects[key];

    if (p) {
        document.title = p.title + " | Gabriel's Portfolio";

        // Update meta tags dynamically
        const pageUrl   = 'https://gabtrex.github.io/project.html?project=' + key;
        const heroImg   = 'https://gabtrex.github.io/' + p.heroImg;
        const desc      = p.cardSubtitle || p.subtitle || '';
        document.querySelector('meta[name="description"]').setAttribute('content', desc);
        document.querySelector('meta[property="og:title"]').setAttribute('content', p.title + ' | Gabtrex Portfolio');
        document.querySelector('meta[property="og:description"]').setAttribute('content', desc);
        document.querySelector('meta[property="og:url"]').setAttribute('content', pageUrl);
        document.querySelector('meta[property="og:image"]').setAttribute('content', heroImg);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', p.title + ' | Gabtrex Portfolio');
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', desc);
        document.querySelector('meta[name="twitter:image"]').setAttribute('content', heroImg);

        document.getElementById('project-title').innerText    = p.title;
        document.getElementById('project-subtitle').innerText = p.subtitle;
        document.getElementById('project-description').innerHTML = p.description;

        const dateEl = document.getElementById('project-date-hero');
        dateEl.innerText     = p.date || '';
        dateEl.style.display = p.date ? 'block' : 'none';

        const heroBg = document.getElementById('heroBg');
        heroBg.style.backgroundImage    = `url('${p.heroImg}')`;
        heroBg.style.backgroundPosition = p.heroPosition || 'center 20%';
        setTimeout(() => heroBg.classList.add('loaded'), 50);

        const playLink   = document.getElementById('play-link');
        playLink.href    = p.playLink;
        playLink.target  = '_blank';
        playLink.innerText = p.isGame === false ? 'Visit Website' : 'Play Game';

        document.getElementById('screenshot1').src = p.screenshots[0];
        document.getElementById('screenshot2').src = p.screenshots[1];
        document.getElementById('screenshot3').src = p.screenshots[2];

        const grid = document.getElementById('project-skills-grid');
        if (p.skills && p.skills.length > 0) {
            p.skills.forEach(k => {
                const skill = allSkills[k];
                if (!skill) return;
                grid.innerHTML += `
                    <div class="skill-item">
                        <div class="skill-icon"><img src="${skill.img}" alt="${skill.label}"></div>
                        <span>${skill.label}</span>
                    </div>
                `;
            });
        } else {
            document.getElementById('project-skills-section').style.display = 'none';
        }

        // Play in Browser embed
        if (p.embedUrl) {
            const embedSection = document.getElementById('play-in-browser');
            const iframe       = document.getElementById('game-iframe');
            const browserBtn   = document.getElementById('play-browser-btn');
            embedSection.style.display = 'block';
            browserBtn.style.display   = 'inline-flex';
            iframe.src = p.embedUrl;

            // Fullscreen button
            const fullscreenBtn = document.getElementById('game-fullscreen-btn');

            if (p.allowFullscreen) {
                fullscreenBtn.style.display = 'flex';

                fullscreenBtn.addEventListener('click', function() {
                    if (iframe.requestFullscreen)            iframe.requestFullscreen();
                    else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
                    else if (iframe.mozRequestFullScreen)    iframe.mozRequestFullScreen();
                });

            } else {
                fullscreenBtn.style.display = 'none';
            }
        }
    }

    // ── Smooth scroll for Play in Browser ───────────────────────
    document.getElementById('play-browser-btn')?.addEventListener('click', function(e) {
        e.preventDefault();

        const target = document.querySelector('#play-in-browser');
        if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
        }
    });
</script>

</body>
</html>
